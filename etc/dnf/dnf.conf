# DNF configuration for DotFriedRice.
#
# This gets symlinked to /etc/dnf/dnf.conf on Fedora. It enables faster
# package downloads and a couple of quality of life defaults that mirror the
# Arch pacman options managed by DotFriedRice in etc/pacman.d/01-options.conf.

[main]
gpgcheck=1
installonly_limit=2
clean_requirements_on_remove=True
best=False
skip_if_unavailable=True
# Speed up metadata and downloads.
fastestmirror=True
max_parallel_downloads=8
# Keep the cache small but useful.
keepcache=0
# Defaults to yes for prompts
defaultyes=True
