[main]
gpgcheck=1
installonly_limit=2
skip_if_unavailable=True
max_parallel_downloads=8
# Speed up metadata and downloads.
fastestmirror=True
# Keep the cache small but useful.
keepcache=0
# Defaults to yes for prompts
defaultyes=True
# best: True = fail loudly on best-version conflicts (RHEL default, safer)
#       False = silently fall back to older version instead of failing
#       (useful mainly if 3rd-party repos like RPM Fusion/Chrome/Docker
#       conflict with Fedora's own package versions)
# Prefer leaving this True and using `--nobest` per-command when needed,
# rather than disabling the check globally.
best=True
